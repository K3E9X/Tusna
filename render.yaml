# One-click deploy of the Octopus collector (Maigret worker) on Render.
# Render → New → Blueprint → this repo. It reads this file and provisions the
# service. Copy the resulting URL into your Vercel project as COLLECTOR_URL
# (and the generated token as COLLECTOR_TOKEN on both sides).
services:
  - type: web
    name: octopus-collector
    runtime: docker
    dockerfilePath: ./collector/Dockerfile
    dockerContext: ./collector
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: "8000"
      - key: COLLECTOR_TOKEN
        generateValue: true
