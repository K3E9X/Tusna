# Tusna — full local stack in one command. Works on Windows (Docker Desktop / WSL2)
# and Linux the same way.
#
#   docker compose up --build            # app + deep-scan collector
#   docker compose --profile db up --build   # + a local Postgres for durable cases
#
# Then open http://localhost:3000
#
# The app auto-detects what's available: with the collector running, the "Maigret
# (deep)" / Holehe / SpiderFoot apps light up; with Postgres, cases persist server-side.
# Nothing here is mandatory — remove a service and the app still runs, degrading cleanly.

services:
  app:
    build: .
    image: tusna:local
    ports:
      - "3000:3000"
    environment:
      # point the app at the collector service on the compose network
      COLLECTOR_URL: "http://collector:8000"
      COLLECTOR_TOKEN: "${COLLECTOR_TOKEN:-}"
      # durable storage (only used if the db profile is up, or set your own URL)
      POSTGRES_URL: "${POSTGRES_URL:-}"
      # optional bonus sources — leave empty to keep them off
      INTELX_API_KEY: "${INTELX_API_KEY:-}"
      RECORDED_FUTURE_API_KEY: "${RECORDED_FUTURE_API_KEY:-}"
      LLM_API_URL: "${LLM_API_URL:-}"
      LLM_MODEL: "${LLM_MODEL:-}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
    depends_on:
      - collector
    restart: unless-stopped

  collector:
    build: ./collector
    image: tusna-collector:local
    ports:
      - "8000:8000"
    environment:
      COLLECTOR_TOKEN: "${COLLECTOR_TOKEN:-}"
    restart: unless-stopped

  # optional: a local Postgres so cases + snapshot history persist across restarts.
  # enable with:  docker compose --profile db up
  db:
    profiles: ["db"]
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tusna
      POSTGRES_PASSWORD: tusna
      POSTGRES_DB: tusna
    ports:
      - "5432:5432"
    volumes:
      - tusna_pg:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  tusna_pg:
